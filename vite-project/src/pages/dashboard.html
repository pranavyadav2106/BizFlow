<div class="page-header">
  <div>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Live overview of your business.</p>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="loadPage('dashboard')">↻ Refresh</button>
</div>

<div class="cards">
  <div class="card">
    <div class="card-icon" style="background:rgba(59,130,246,0.12);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
    </div>
    <h3>Total Orders</h3>
    <p id="stat-orders">—</p>
  </div>
  <div class="card">
    <div class="card-icon" style="background:rgba(52,211,153,0.1);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    </div>
    <h3>Total Revenue</h3>
    <p id="stat-revenue">—</p>
    <div class="card-trend">Amount received</div>
  </div>
  <div class="card">
    <div class="card-icon" style="background:rgba(96,165,250,0.1);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    </div>
    <h3>Total Clients</h3>
    <p id="stat-clients">—</p>
  </div>
  <div class="card">
    <div class="card-icon" style="background:rgba(248,113,113,0.1);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <h3>Pending Payments</h3>
    <p id="stat-pending">—</p>
    <div class="card-trend" style="color:#f87171;" id="stat-pending-sub"></div>
  </div>
</div>

<h2 class="section-title">Recent Orders</h2>
<div class="table-wrapper">
<table class="orders-table">
<thead><tr><th>Order ID</th><th>Client</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
<tbody id="dash-orders"></tbody>
</table>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:28px;">
  <div>
    <h2 class="section-title">Low / Out of Stock Alerts</h2>
    <div class="table-wrapper">
    <table class="table"><thead><tr><th>Product</th><th>Stock</th><th>Status</th></tr></thead>
    <tbody id="dash-stock"></tbody></table>
    </div>
  </div>
  <div>
    <h2 class="section-title">Recent Transactions</h2>
    <div class="table-wrapper">
    <table class="table"><thead><tr><th>Entity</th><th>Amount</th><th>Type</th></tr></thead>
    <tbody id="dash-txns"></tbody></table>
    </div>
  </div>
</div>

<script>
(function() {
  const stats = Dashboard.stats();
  document.getElementById('stat-orders').textContent  = stats.totalOrders;
  document.getElementById('stat-revenue').textContent = formatINR(stats.totalRevenue);
  document.getElementById('stat-clients').textContent = stats.totalClients;
  document.getElementById('stat-pending').textContent = formatINR(stats.pendingPayments);
  const pc = Orders.all().filter(o => o.status === 'Pending').length;
  document.getElementById('stat-pending-sub').textContent = pc + ' unpaid order' + (pc !== 1 ? 's' : '');

  const orders = Orders.all().slice(0, 6);
  document.getElementById('dash-orders').innerHTML = orders.length ? orders.map(o => `
    <tr>
      <td><span style="font-family:'Syne',sans-serif;font-weight:700;color:#3b82f6;">${escHtml(o.id)}</span></td>
      <td>${escHtml(o.clientName)}</td><td>${formatINR(o.total)}</td>
      <td style="color:var(--text-secondary);">${escHtml(o.date)}</td>
      <td><span class="${o.status==='Paid'?'paid':'pending'}">${escHtml(o.status)}</span></td>
    </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px;">No orders yet</td></tr>';

  const lowStock = Products.all().filter(p => p.stock <= 15).slice(0, 5);
  document.getElementById('dash-stock').innerHTML = lowStock.length ? lowStock.map(p => {
    const s = Products.stockStatus(p.stock);
    return `<tr><td>${escHtml(p.name)}</td><td>${p.stock}</td><td><span class="${s.cls}">${s.label}</span></td></tr>`;
  }).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:18px;">All items stocked up!</td></tr>';

  const txns = Transactions.all().slice(0, 5);
  document.getElementById('dash-txns').innerHTML = txns.length ? txns.map(t => `
    <tr>
      <td>${escHtml(t.entity)}</td>
      <td style="color:${t.type==='received'?'var(--green)':'var(--red)'};font-weight:600;">${t.type==='received'?'+':'−'}${formatINR(t.amount)}</td>
      <td><span style="font-size:11px;font-weight:600;color:${t.type==='received'?'var(--green)':t.type==='paid'?'var(--red)':'var(--orange)'}">${t.type.toUpperCase()}</span></td>
    </tr>`).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:18px;">No transactions</td></tr>';
})();
</script>
