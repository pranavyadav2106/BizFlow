<div class="page-header">
  <div>
    <h1 class="page-title">Vendors</h1>
    <p class="page-subtitle">Manage suppliers and record purchases.</p>
  </div>
  <button class="add-vendor-btn" onclick="openAddVendor()">+ Add Vendor</button>
</div>

<div class="cards" style="margin-bottom:24px;">
  <div class="card"><h3>Total Vendors</h3><p id="v-total">—</p></div>
  <div class="card"><h3>Total Paid</h3><p id="v-paid" style="color:#34d399;">—</p></div>
  <div class="card"><h3>Products Supplied</h3><p id="v-products">—</p></div>
  <div class="card"><h3>Recent Purchases</h3><p id="v-recent">—</p></div>
</div>

<div class="vendor-header">
  <input type="text" placeholder="Search vendors..." class="search-box" id="v-search" oninput="renderVendors()">
  <button class="btn btn-ghost btn-sm" onclick="renderVendors()">↻ Refresh</button>
</div>

<div class="table-wrapper">
<table class="table">
<thead><tr><th>Vendor</th><th>Contact</th><th>City</th><th>Products</th><th>Total Purchases</th><th>Actions</th></tr></thead>
<tbody id="vendors-tbody"></tbody>
</table>
</div>

<script>
const VCOLORS = [
  {bg:'rgba(59,130,246,0.13)',color:'#3b82f6'},
  {bg:'rgba(251,146,60,0.1)',color:'#fb923c'},
  {bg:'rgba(52,211,153,0.1)',color:'#34d399'},
  {bg:'rgba(167,139,250,0.1)',color:'#a78bfa'},
];

function renderVendors() {
  const q = (document.getElementById('v-search')?.value || '').toLowerCase();
  const all = Vendors.all();
  const filtered = q ? all.filter(v => v.name.toLowerCase().includes(q)) : all;
  const totalPaid = all.reduce((s, v) => s + (v.totalPurchases||0), 0);
  const recentTxns = Transactions.all().filter(t => t.type === 'paid').length;

  document.getElementById('v-total').textContent    = all.length;
  document.getElementById('v-paid').textContent     = formatINR(totalPaid);
  document.getElementById('v-products').textContent = Products.all().length;
  document.getElementById('v-recent').textContent   = recentTxns;

  const rows = filtered.map((v, i) => {
    const col = VCOLORS[i % VCOLORS.length];
    const products = Products.all().filter(p => p.vendorId === v.id);
    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="avatar" style="background:${col.bg};color:${col.color};">${escHtml(v.name[0])}</div>
          <strong>${escHtml(v.name)}</strong>
        </div>
      </td>
      <td style="color:var(--text-secondary);">${escHtml(v.phone||'—')}</td>
      <td style="color:var(--text-secondary);">${escHtml(v.city||'—')}</td>
      <td style="color:var(--text-secondary);">${products.map(p=>escHtml(p.name)).join(', ')||'—'}</td>
      <td style="color:var(--green);font-weight:600;">${formatINR(v.totalPurchases||0)}</td>
      <td style="display:flex;gap:6px;">
        <button class="view-btn" onclick="openRecordPurchase('${escHtml(v.id)}','${escHtml(v.name)}')">Record Purchase</button>
        <button class="view-btn" onclick="openEditVendor('${escHtml(v.id)}')">Edit</button>
        <button class="view-btn" style="color:var(--red);border-color:rgba(248,113,113,0.25);" onclick="deleteVendor('${escHtml(v.id)}','${escHtml(v.name)}')">Delete</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('vendors-tbody').innerHTML = rows || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:28px;">No vendors found.</td></tr>';
}

function vendorFormHTML(v = {}) {
  return `
    <div class="form-row">
      <div class="form-group"><label>Vendor Name *</label><input id="f-vname" value="${escHtml(v.name||'')}" placeholder="e.g. ABC Foods"></div>
      <div class="form-group"><label>City</label><input id="f-vcity" value="${escHtml(v.city||'')}" placeholder="e.g. Mumbai"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input id="f-vphone" value="${escHtml(v.phone||'')}" placeholder="+91 XXXXX XXXXX"></div>
      <div class="form-group"><label>Email</label><input id="f-vemail" value="${escHtml(v.email||'')}" placeholder="email@example.com"></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="Modal.close()">Cancel</button>
      <button class="btn-save" onclick="${v.id?`saveEditVendor('${v.id}')`:'saveAddVendor()'}">Save Vendor</button>
    </div>`;
}

function openAddVendor() { Modal.open('Add New Vendor', vendorFormHTML()); }
function openEditVendor(id) { const v = Vendors.get(id); if (v) Modal.open('Edit Vendor', vendorFormHTML(v)); }

function saveAddVendor() {
  const name = document.getElementById('f-vname').value.trim();
  if (!name) { Modal.toast('Vendor name is required','error'); return; }
  Vendors.add({ name, city: document.getElementById('f-vcity').value.trim(), phone: document.getElementById('f-vphone').value.trim(), email: document.getElementById('f-vemail').value.trim() });
  Modal.close(); Modal.toast('Vendor added'); renderVendors();
}

function saveEditVendor(id) {
  const name = document.getElementById('f-vname').value.trim();
  if (!name) { Modal.toast('Vendor name is required','error'); return; }
  Vendors.update(id, { name, city: document.getElementById('f-vcity').value.trim(), phone: document.getElementById('f-vphone').value.trim(), email: document.getElementById('f-vemail').value.trim() });
  Modal.close(); Modal.toast('Vendor updated'); renderVendors();
}

function openRecordPurchase(vendorId, vendorName) {
  const productOptions = Products.all().map(p => `<option value="${escHtml(p.id)}" data-price="${p.price}">${escHtml(p.name)} (₹${p.price} — Stock: ${p.stock})</option>`).join('');
  Modal.open('Record Purchase — ' + vendorName, `
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">Stock will increase for each item added below. Payment will be logged in Account.</p>
    <div id="purchase-items">
      <div class="order-item-row">
        <select class="pi-product" onchange="updatePurchaseTotal()">${productOptions}</select>
        <input class="pi-qty" type="number" min="1" value="1" placeholder="Qty" oninput="updatePurchaseTotal()">
        <input class="pi-price" type="number" min="0" placeholder="₹" oninput="updatePurchaseTotal()">
        <button class="remove-item-btn" onclick="removePurchaseRow(this)">×</button>
      </div>
    </div>
    <button class="add-item-btn" onclick="addPurchaseRow()">+ Add Item</button>
    <div class="order-total-preview"><span>Total Amount</span><strong id="purchase-total">₹0</strong></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="Modal.close()">Cancel</button>
      <button class="btn-save" onclick="savePurchase('${vendorId}')">Record Purchase</button>
    </div>`);
  // Set first product's price
  setTimeout(() => {
    const sel = document.querySelector('.pi-product');
    const priceEl = sel?.closest('.order-item-row').querySelector('.pi-price');
    if (sel && priceEl) priceEl.value = sel.options[sel.selectedIndex]?.dataset?.price || '';
    updatePurchaseTotal();
  }, 50);
}

function addPurchaseRow() {
  const productOptions = Products.all().map(p => `<option value="${escHtml(p.id)}" data-price="${p.price}">${escHtml(p.name)} (₹${p.price} — Stock: ${p.stock})</option>`).join('');
  const div = document.createElement('div');
  div.className = 'order-item-row';
  div.innerHTML = `<select class="pi-product" onchange="updatePurchaseTotal()">${productOptions}</select>
    <input class="pi-qty" type="number" min="1" value="1" oninput="updatePurchaseTotal()">
    <input class="pi-price" type="number" min="0" placeholder="₹" oninput="updatePurchaseTotal()">
    <button class="remove-item-btn" onclick="removePurchaseRow(this)">×</button>`;
  document.getElementById('purchase-items').appendChild(div);
  setTimeout(() => {
    const sel = div.querySelector('.pi-product');
    const priceEl = div.querySelector('.pi-price');
    if (sel && priceEl) priceEl.value = sel.options[sel.selectedIndex]?.dataset?.price || '';
    updatePurchaseTotal();
  }, 20);
}

function removePurchaseRow(btn) {
  const rows = document.querySelectorAll('.order-item-row');
  if (rows.length > 1) { btn.closest('.order-item-row').remove(); updatePurchaseTotal(); }
}

function updatePurchaseTotal() {
  let total = 0;
  document.querySelectorAll('.order-item-row').forEach(row => {
    const qty = parseFloat(row.querySelector('.pi-qty')?.value) || 0;
    const price = parseFloat(row.querySelector('.pi-price')?.value) || 0;
    total += qty * price;
  });
  const el = document.getElementById('purchase-total');
  if (el) el.textContent = formatINR(total);
}

function savePurchase(vendorId) {
  const rows = document.querySelectorAll('.order-item-row');
  const items = [];
  let total = 0;
  rows.forEach(row => {
    const productId = row.querySelector('.pi-product').value;
    const qty = parseInt(row.querySelector('.pi-qty').value) || 0;
    const unitPrice = parseFloat(row.querySelector('.pi-price').value) || 0;
    if (productId && qty > 0) {
      const product = Products.get(productId);
      items.push({ productId, productName: product?.name||'', qty, unitPrice });
      total += qty * unitPrice;
    }
  });
  if (!items.length) { Modal.toast('Add at least one item', 'error'); return; }
  Vendors.recordPurchase(vendorId, items, total);
  Modal.close(); Modal.toast('Purchase recorded — stock updated!');
  renderVendors();
}

function deleteVendor(id, name) {
  Modal.open('Delete Vendor', `
    <p class="confirm-msg">Delete <span class="confirm-name">${escHtml(name)}</span>? This cannot be undone.</p>
    <div class="form-actions">
      <button class="btn-cancel" onclick="Modal.close()">Cancel</button>
      <button class="btn-danger" onclick="Vendors.delete('${id}');Modal.close();Modal.toast('Vendor deleted');renderVendors()">Yes, Delete</button>
    </div>`);
}

renderVendors();
</script>
